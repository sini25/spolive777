<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spolive - Login</title>
<link rel="stylesheet" href="css/login.css">
</head>
<body>

<div class="login-wrapper">
    <div class="login-card">

        <h1 class="logo">SPO<span>LIVE</span></h1>
        <p class="subtitle">Welcome back. Please login to continue.</p>

        <form class="login-form">
            
            <div class="input-group">
                <label>Email</label>
                <input type="email" placeholder="Enter your email">
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" placeholder="Enter your password">
            </div>

            <div class="options">
                <label class="remember">
                    <input type="checkbox">
                    Remember me
                </label>
                <a href="forgotpassword.html" class="forgot">Forgot password?</a>
            </div>

            <button type="button" class="btn-primary" 
                onclick="window.location.href='homepage.html'">Login</button>

            <p class="register">
                Don’t have an account?
                <a href="register-step1.html">Register now</a>
            </p>

        </form>

    </div>
</div>

</body>
</html>
