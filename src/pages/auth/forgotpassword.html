<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spolive - Forgot Password</title>
<link rel="stylesheet" href="../../../css/forgot-password.css">
<link rel="stylesheet" href="../../../css/button.css">

</head>
<body>

<div class="forgot-wrapper">
    <div class="forgot-card">

        <h1 class="logo">SPO<span>LIVE</span></h1>
        <p class="subtitle">
            Enter your email address and we'll send you a password reset link.
        </p>

        <form class="forgot-form">

            <div class="input-group">
                <label>Email <span class="required">*</span></label>
                <input type="email" placeholder="Enter your registered email" required>
            </div>

            <div class="btn-wrapper">
                <button type="submit" class="btn-primary">Send Reset Link</button>
                <p class="back-login">Remember your password? <a href="../login.html">Back to Login</a></p>
            </div>

        </form>

    </div>
</div>

</body>
</html>
