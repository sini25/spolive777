<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spolive - Login</title>
    <link rel="stylesheet" href="../../../css/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<div class="login-wrapper">
    <div class="login-card">

        <h1 class="logo">SPO<span>LIVE</span></h1>
        <p class="subtitle">Welcome back. Please login to continue.</p>

        <form class="login-form">
            
            <!-- ID -->
            <div class="input-group">
                <label>Id<span class="required">*</span></label>
                <input type="text" placeholder="Enter your id" required>
            </div>

            <!-- PASSWORD -->
            <div class="input-group">
                <label>Password<span class="required">*</span></label>

                <div class="password-wrapper">
                    <input type="password" id="password" placeholder="Enter your password" required>
                    <i class="fa-solid fa-eye-slash" id="togglePassword"></i>
                </div>
            </div>

            <!-- OPTIONS -->
            <div class="options">
                <label class="remember">
                    <input type="checkbox">
                    Remember me
                </label>
                <a href="../../../src/pages/auth/forgotpassword.html" class="forgot">Forgot password?</a>
            </div>

            <!-- BUTTON -->
            <button type="button" class="btn-primary" onclick="loginUser()">Login</button>

            <!-- LOADER -->
            <div id="loader" class="loader-container">
                <div class="spinner"></div>
            </div>

            <!-- REGISTER -->
            <p class="register">
                Don’t have an account?
                <a href="../../../src/pages/auth/register/register-step1.html">Register now</a>
            </p>

        </form>

    </div>
</div>

<script src="../../../js/app.js"></script>
</body>
</html>
