<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spolive - Register</title>
    <link rel="stylesheet" href="css/register.css">
    <link rel="stylesheet" href="css/button.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="register-wrapper">
    <div class="register-card">

        <h1 class="logo">SPO<span>LIVE</span></h1>
        <p class="subtitle">Almost there! Just a few more details to complete.</p>

        <div class="step-progress">
            <div class="step-success">
                <div class="circle" onclick="goStep1()"><i class="fa-solid fa-check"></i></div>
                <p>General<br>Details</p>
            </div>

            <div class="step-success">
                <div class="circle" onclick="goStep2()"><i class="fa-solid fa-check"></i></div>
                <p>Bank<br>Details</p>
            </div>

            <div class="step active">
                <div class="circle">3</div>
                <p>Account<br>Created</p>
            </div>
        </div>

        <form class="register-form">
            <div class="success-wrapper">
                <!-- <i class="fa-solid fa-thumbs-up"></i> -->
                <!-- <img src="images/promo2.gif" alt="success"> -->
                 <!-- <div class="gif-wrapper"> -->
                    <dotlottie-wc src="https://lottie.host/6d2a07f8-49ae-4559-a0a4-8b7f2a403b63/f95KoDbHVk.lottie" autoplay loop></dotlottie-wc>
                 <!-- </div> -->
                <h2>New Account Created!</h2>
                <p>Your account has been successfully created. You can now log in and using the platform.</p>
            </div>
            <div class="btn-wrapper">
                <!-- <button type="button" class="btn-secondary" onclick="goStep1()">Cancel</button> -->
                <button type="button" class="btn-primary" onclick="goLogin()">Go to Login</button>
            </div>
        </form>

    </div>
</div>


<script src="js/app.js"></script>
<script src="https://unpkg.com/@lottiefiles/dotlottie-wc@0.9.3/dist/dotlottie-wc.js" type="module"></script>


</body>
</html>
