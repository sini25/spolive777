<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spolive - Register</title>
    <link rel="stylesheet" href="css/register.css">
    <link rel="stylesheet" href="css/button.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="register-wrapper">
    <div class="register-card">

        <h1 class="logo">SPO<span>LIVE</span></h1>
        <p class="subtitle">Create your account and start winning.</p>

        <div class="step-progress">
            <div class="step active">
                <div class="circle">1</div>
                <p>General<br>Details</p>
            </div>

            <div class="step">
                <div class="circle">2</div>
                <p>Bank<br>Details</p>
            </div>

            <div class="step">
                <div class="circle">3</div>
                <p>Account<br>Created</p>
            </div>
        </div>

        <form class="register-form">
            

            <div class="form-row">
                <div class="input-group">
                <label>Country <span class="required">*</span></label>
                    <div class="select-wrapper">
                        <i class="fa-solid fa-chevron-down"></i>
                        <select name="country" id="country">
                            <!-- <option selected disabled value="korea">Korea</option> -->
                            <option value="korea">Korea</option>
                            <option value="malaysia">Malaysia</option>
                            <option value="singapore">Singapore</option>
                            <option value="japan">Japan</option>
                            <option value="thailand">Thailand</option>
                            <option value="indonesia">Indonesia</option>
                        </select>
                    </div>
                </div>

                <div class="input-group">
                <label for="call">Call</label>
                    <div class="select-wrapper">
                        <i class="fa-solid fa-chevron-down"></i>
                        <select name="call" id="call">
                        <!-- <option selected disabled value="krw">KRW</option> -->
                        <option value="krw">KRW</option>
                        <option value="myr">MYR</option>
                        <option value="sgd">SGD</option>
                        <option value="jpn">JPN</option>
                        <option value="bht">BHT</option>
                        <option value="rup">RUP</option>
                    </select>
                    </div>
                </div>

            </div>

            <div class="input-group">
                <label>Email <span class="required">*</span></label>
                <input type="email" placeholder="example@gmail.com">
            </div>

            <div class="input-group">
                <label>Password <span class="required">*</span></label>
                <input type="password" placeholder="Create your password">
            </div>

            <div class="input-group">
                <label>Confirm Password <span class="required">*</span></label>
                <input type="password" placeholder="Please enter your password again">
            </div>

            <div class="terms">
                <label>
                    <input type="checkbox">
                    I agree to the <a href="#">Terms & Conditions</a>
                </label>
            </div>

            <div class="btn-wrapper">
                <!-- <button type="button" class="btn-secondary" onclick="goLogin()">Cancel</button> -->
                <button type="button" class="btn-primary" onclick="nextStep()">Next</button>

                <p class="login-link">Already have an account? <a href="login.html">Login</a></p>
            </div>

            <!-- <button type="submit" class="btn-primary">Create Account</button> -->
            
            
            <!-- <p class="login-link">Already have an account?<a href="login.html">Login</a></p> -->


        </form>

    </div>
</div>

<script src="js/app.js"></script>


</body>
</html>
