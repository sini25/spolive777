<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spolive - Register</title>
<link rel="stylesheet" href="css/register.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="register-wrapper">
    <div class="register-card">

        <h1 class="logo">SPO<span>LIVE</span></h1>
        <p class="subtitle">Almost there! Just a few more details to complete.</p>

        <div class="step-progress">
            <div class="step">
                <div class="circle"><i class="fa-solid fa-check"></i></div>
                <p>General<br>Details</p>
            </div>

            <div class="step active">
                <div class="circle">2</div>
                <p>Bank<br>Details</p>
            </div>

            <div class="step">
                <div class="circle">3</div>
                <p>Account<br>Created</p>
            </div>
        </div>

        <form class="register-form">

            <div class="input-group">
                <label>Phone Number</label>
                <input type="phone" placeholder="Eg: 0143123454">
            </div>

            <div class="form-row">
                <div class="input-group">
                    <label>Bank Name <span class="required">*</span></label>
                        <div class="select-wrapper">
                            <i class="fa-solid fa-chevron-down"></i>
                            <select name="bank_name" id="bank_name">
                                <!-- <option selected disabled value="korea">Korea</option> -->
                                <option value="bank_1">Industrial Bank of Korea</option>
                                <option value="bank_2">Bank 2</option>
                                <option value="bank_3">Bank 3</option>
                                <option value="bank_">Bank 4</option>
                                <option value="bank_5">Bank 5</option>
                            </select>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Account Number <span class="required">*</span></label>
                        <input type="number" placeholder="Enter your account number">
                    </div>
            </div>
            
            

            <div class="input-group">
                <label>Full Name <span class="required">*</span></label>
                <input type="name" placeholder="Enter your full name">
            </div>

    
                <div class="input-group">
                    <label>Referral code <span class="required">*</span></label>
                    <input type="name" placeholder="Enter referral code">
                </div>

                <button type="button" class="btn-secondary">Send again</button>


            <div class="input-group">
            <label for="method">Authentication Method <span class="required">*</span></label>
                <div class="select-wrapper">
                    <i class="fa-solid fa-chevron-down"></i>
                    <select name="method" id="method">
                    <option value="method_1">Method 1</option>
                    <option value="method_2">Method 2</option>
                    <option value="method_3">Method 3</option>
                </select>
                </div>
            </div>


            <div class="terms">
                <label>
                    <input type="checkbox">
                    I agree to the <a href="#">Terms of Use & Privacy Policy and am 18 years of age or older.</a>
                </label>
            </div>

            <div class="btn-wrapper">
                <button type="button" class="btn-secondary" onclick="goStep1()">Cancel</button>
                <button type="button" class="btn-primary" onclick="nextStep()">Create Account</button>
            </div>

            <!-- <button type="submit" class="btn-primary">Create Account</button> -->

            <p class="login-link">
                Already have an account?
                <a href="login.html">Login</a>
            </p>

        </form>

    </div>
</div>


<script>

function nextStep(){

    // Example validation
    const email = document.querySelector("input[type='email']").value;

    if(email === ""){
        alert("Please enter email first");
        return;
    }

    // redirect to step 2 page
    window.location.href = "homepage.html";

}

function goStep1(){
    window.location.href = "register-step1.html";
}

</script>

</body>
</html>
