<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spolive - Register</title>
<link rel="stylesheet" href="css/register.css">
</head>
<body>

<div class="register-wrapper">
    <div class="register-card">

        <h1 class="logo">SPO<span>LIVE</span></h1>
        <p class="subtitle">Create your account and start winning.</p>

        <form class="register-form">
            
            <div class="input-group">
                <label>Nation</label>
                <select>
                    <option selected disabled>Korea</option>
                    <option>Malaysia</option>
                    <option>Singapore</option>
                    <option>Japan</option>
                    <option>Thailand</option>
                    <option>Indonesia</option>
                </select>
            </div>

            <div class="input-group">
                <label>Call</label>
                <select>
                    <option selected disabled>KRW</option>
                    <option>MYR</option>
                    <option>SGD</option>
                    <option>JPN</option>
                    <option>BHT</option>
                    <option>RUP</option>
                </select>
            </div>

            <div class="input-group">
                <label>Email<span class="required">*</span></label>
                <input type="email" placeholder="Enter email">
            </div>

            <div class="input-group">
                <label>Password<span class="required">*</span></label>
                <input type="password" placeholder="Create your password">
            </div>

            <div class="input-group">
                <label>Confirm Password<span class="required">*</span></label>
                <input type="password" placeholder="Please enter your password again">
            </div>

            <div class="terms">
                <label>
                    <input type="checkbox">
                    I agree to the <a href="#">Terms & Conditions</a>
                </label>
            </div>

            <button type="submit" class="btn-primary">Create Account</button>

            <p class="login-link">
                Already have an account?
                <a href="login.html">Login</a>
            </p>

        </form>

    </div>
</div>

</body>
</html>
